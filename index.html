<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blossomspelet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Blossomspelet</h1>
        <p id="statusText">Välj antal spelare och börja para.</p>
      </div>
      <div class="controls" aria-label="Inställningar">
        <label for="playerCount">Spelare</label>
        <select id="playerCount"></select>
        <button id="newGameButton" type="button">Ny lista</button>
      </div>
    </header>

    <section id="roundSummary" class="summary" aria-label="Rondinformation">
      <div>
        <span>Rond</span>
        <strong id="roundText">1/1</strong>
      </div>
      <div>
        <span>Vald summa</span>
        <strong id="selectedTotal">0</strong>
      </div>
      <div>
        <span>Optimal summa</span>
        <strong id="optimalTotal">-</strong>
      </div>
    </section>

    <section id="finalResults" class="finalResults" aria-label="Resultat" hidden>
      <div id="roundResults" class="roundResults"></div>
      <div class="finalNav" aria-label="Inspektera rond">
        <button id="prevRoundButton" type="button">rond-1</button>
        <strong id="inspectRoundText">Rond 1</strong>
        <button id="nextRoundButton" type="button">rond+1</button>
      </div>
    </section>

    <section class="boardShell" aria-label="Elo-matris">
      <div id="matrix" class="matrix"></div>
    </section>

    <footer class="actionbar">
      <button id="clearButton" type="button">Rensa val</button>
      <button id="nextButton" type="button">Nästa</button>
    </footer>
  </main>

  <script src="blossom.js"></script>
  <script src="app.js"></script>
</body>
</html>
